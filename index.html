<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WR Clicker - Wodorfells Code</title>
    <style>
        /* Wodorfells Code */
        :root {
            --primary-red: #ff4d4d;
            --primary-green: #2ecc71;
            --primary-purple: #a855f7;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --blur-val: 15px;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0b0f1a;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Wodorfells Code */
        .corner-logo {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 50px;
            height: auto;
            z-index: 1000;
            opacity: 0.7;
            filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.3));
        }

        .blob {
            position: absolute;
            width: 350px;
            height: 350px;
            filter: blur(90px);
            z-index: -1;
            border-radius: 50%;
            opacity: 0.35;
            animation: pulse 8s infinite alternate;
        }
        .blob-red { top: -100px; left: -100px; background: var(--primary-red); }
        .blob-green { bottom: -100px; right: -100px; background: var(--primary-green); }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur-val));
            -webkit-backdrop-filter: blur(var(--blur-val));
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 50px 30px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 85%;
            z-index: 10;
        }

        h1 { margin: 0 0 10px 0; font-size: 2.2rem; letter-spacing: -1px; }
        p { font-size: 1.1rem; opacity: 0.7; margin-bottom: 30px; }

        .status-container {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        #status-indicator { color: var(--primary-green); font-weight: bold; text-transform: uppercase; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }

        button {
            background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
            color: #0b0f1a;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button.game-btn {
            background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%);
            color: white;
        }

        button:hover { transform: scale(1.05); }

        /* Wodorfells Code */
        #game-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e1b4b 0%, #0b0f1a 100%);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .score-container {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
        }

        .clicker-container {
            position: relative;
            width: 280px;
            height: 280px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 8px solid rgba(168, 85, 247, 0.3);
            transition: transform 0.05s;
            user-select: none;
        }

        .clicker-container:active { transform: scale(0.95); }

        .clicker-container img {
            width: 70%;
            pointer-events: none;
        }

        .floating-text {
            position: absolute;
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }

        .back-btn {
            margin-top: 40px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 10px 20px;
        }

        .copyright {
            margin-top: 40px;
            font-size: 0.8rem;
            opacity: 0.5;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <img src="image-Photoroom.png.png" class="corner-logo" alt="Logo">

    <div class="blob blob-red"></div>
    <div class="blob blob-green"></div>

    <div class="card" id="main-menu">
        <h1>Default site on HTML</h1>
        <p>Практическая работа</p>

        <div class="status-container">
            ТЕКУЩИЙ СТАТУС: <span id="status-indicator">АКТИВЕН</span>
        </div>

        <div class="btn-group">
            <button onclick="changeColor()">Переключить эффект</button>
            <button class="game-btn" onclick="toggleGame(true)">Хотите поиграть?</button>
        </div>

        <div class="copyright">
            © 2026 сделано с помощью VeFier Studio
        </div>
    </div>

    <div id="game-overlay">
        <div class="score-container" id="score">0</div>
        
        <div class="clicker-container" onclick="handleClick(event)">
            <img src="image-Photoroom.png.png" alt="WR Logo">
        </div>

        <button class="back-btn" onclick="toggleGame(false)">Назад</button>
        
        <div class="copyright">
            VeFier Studio
        </div>
    </div>

    <script>
        /* Wodorfells Code */
        function changeColor() {
            const status = document.getElementById('status-indicator');
            const card = document.getElementById('main-menu');
            if (status.innerText === 'АКТИВЕН') {
                status.innerText = 'РЕЖИМ ОЖИДАНИЯ';
                status.style.color = '#ff4d4d';
                card.style.boxShadow = '0 15px 35px rgba(255, 77, 77, 0.2)';
            } else {
                status.innerText = 'АКТИВЕН';
                status.style.color = '#2ecc71';
                card.style.boxShadow = '0 15px 35px rgba(0, 0, 0, 0.5)';
            }
        }

        let count = 0;
        function toggleGame(show) {
            document.getElementById('game-overlay').style.display = show ? 'flex' : 'none';
        }

        /* Wodorfells Code */
        function handleClick(e) {
            count++;
            document.getElementById('score').innerText = count;
            const plus = document.createElement('div');
            plus.className = 'floating-text';
            plus.innerText = '+1';
            plus.style.left = e.clientX + 'px';
            plus.style.top = e.clientY + 'px';
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 600);
        }
    </script>
</body>
</html>
